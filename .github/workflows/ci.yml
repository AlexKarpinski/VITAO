name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check project exists
        id: project
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "package.json not found yet. Skipping build/test until the app is initialized."
          fi

      - name: Setup Node
        if: steps.project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.project.outputs.exists == 'true'
        run: npm ci

      - name: Build
        if: steps.project.outputs.exists == 'true'
        run: npm run build

      - name: Check test script
        if: steps.project.outputs.exists == 'true'
        id: test-script
        shell: bash
        run: |
          if npm run | grep -q " test"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No test script found yet. Skipping tests until test tooling is initialized."
          fi

      - name: Test
        if: steps.project.outputs.exists == 'true' && steps.test-script.outputs.exists == 'true'
        run: npm run test -- --run
