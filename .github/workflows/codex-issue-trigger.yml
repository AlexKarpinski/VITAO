name: Trigger Codex from issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  trigger-codex:
    if: github.event.label.name == 'ready-for-codex'
    runs-on: ubuntu-latest

    steps:
      - name: Ask Codex to implement issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            if (issue.pull_request) {
              core.info('This is a pull request, not a regular issue. Skipping.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const alreadyTriggered = comments.some((comment) =>
              comment.body?.includes('@codex implement this issue')
            );

            if (alreadyTriggered) {
              core.info('Codex was already triggered for this issue. Skipping.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `@codex implement this issue.

Please:
- create a branch
- implement the issue requirements
- run build and tests
- open a pull request against main
- keep scope limited to this issue
- do not add backend, database, cart, payments, auth, admin panel, or CMS unless explicitly requested`,
            });
