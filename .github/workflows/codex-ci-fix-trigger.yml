name: Ask Codex to fix failed CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: read
  issues: write
  actions: read
  contents: read

jobs:
  ask-codex:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Ask Codex to fix failed CI
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];

            if (!prs.length) {
              core.info('No PR found for this failed workflow run. Skipping.');
              return;
            }

            const pr = prs[0];
            const prNumber = pr.number;

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const labels = issue.labels.map((label) => label.name);

            if (!labels.includes('codex-auto-fix')) {
              core.info('PR does not have codex-auto-fix label. Skipping.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const alreadyAskedForThisRun = comments.some((comment) =>
              comment.body?.includes(`workflow run ${context.payload.workflow_run.id}`)
            );

            if (alreadyAskedForThisRun) {
              core.info('Codex was already asked to fix this workflow run. Skipping.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `@codex fix the CI failures in this PR.

Failed workflow run ${context.payload.workflow_run.id}: ${context.payload.workflow_run.html_url}

Please:
- inspect the failed GitHub Actions run
- fix only CI, build, dependency, or test issues
- run install, build, and tests
- push the fix to the same PR branch
- do not create a new PR
- keep scope limited to making CI green`,
            });
